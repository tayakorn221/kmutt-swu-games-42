<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>การ์ดสรุปแมตช์ มจธ. · มศว เกมส์ 42</title>
<!-- ฟอนต์ฝัง base64 ทั้ง thai+latin (จอ=รูป, ออฟไลน์ได้) · ข้อมูล fallback · html-to-image -->
<script src="summary-fonts.js"></script>
<script src="data.js"></script>
<script src="html-to-image.js"></script>
<style>
:root{
  --card-w:1080px; --card-h:1350px;
  --orange:#FF6A1A; --orange-deep:#D8480C; --maroon:#9C1B3C; --maroon-deep:#73142C;
  --gold:#E9B84A;
  --ink:#0E1217; --ink2:#161C25; --surface:#1C2430; --surface2:#222C3A;
  --line:rgba(255,255,255,.09); --line2:rgba(255,255,255,.15);
  --text:#F4F7FB; --muted:#9AA7B8; --faint:#6B7888;
  --win:#2FBF71; --win-deep:#15A75E; --lose:#FF5747; --wait:#F0A92E; --bye:#6E8DB5;
  --rs:1; /* row-scale ที่ auto-fit ปรับให้พอดีการ์ด */
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'IBM Plex Sans Thai',sans-serif;background:#0A0D12;color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:18px 14px 60px;-webkit-font-smoothing:antialiased;overflow-x:hidden;
}

/* ---------- toolbar (ไม่ถูก capture) ---------- */
.toolbar{width:100%;max-width:560px;display:flex;flex-wrap:wrap;gap:10px;
  align-items:center;justify-content:center;margin-bottom:18px}
.tool{display:flex;align-items:center;gap:6px;background:#161C25;border:1px solid var(--line2);
  border-radius:12px;padding:6px;color:var(--text)}
.tool button,.tool input,.tool select{font:inherit;color:var(--text);background:transparent;
  border:0;cursor:pointer;border-radius:8px;padding:8px 12px}
.tool button:hover{background:#222C3A}
.seg{display:flex;background:#161C25;border:1px solid var(--line2);border-radius:12px;padding:4px}
.seg button{padding:8px 18px;border-radius:9px;font-weight:600;color:var(--muted)}
.seg button.on{background:var(--orange);color:#1A0E06}
.dl{background:linear-gradient(180deg,#FF7A2E,#E85B12);color:#fff;font-weight:700;
  border:0;border-radius:12px;padding:12px 22px;cursor:pointer;box-shadow:0 6px 18px -6px rgba(255,106,26,.6)}
.dl:disabled{opacity:.5;cursor:wait}
.hint{width:100%;max-width:560px;text-align:center;color:var(--faint);font-size:13px;margin:-6px 0 16px}
.hint code{color:var(--muted);background:#161C25;padding:1px 7px;border-radius:6px}

/* ---------- stage (ย่อให้พอดีจอ ด้วย transform; wrapper กันล้นแนวนอน) ---------- */
.stagewrap{margin:0 auto;overflow:hidden}
.stage{transform-origin:top left}

/* ===========================================================
   CARD — 1080x1350 (บ้าแบด/ตัวตึงแบด style, single source ทั้ง 2 โหมด)
   =========================================================== */
#card{
  width:var(--card-w);height:var(--card-h);position:relative;overflow:hidden;
  background:
    radial-gradient(115% 65% at 50% -12%,rgba(255,106,26,.16),transparent 60%),
    radial-gradient(80% 50% at 102% 104%,rgba(45,125,210,.12),transparent 60%),
    linear-gradient(170deg,#0E131C 0%,#0A0D14 55%,#0C111A 100%);
  color:var(--text);font-family:'IBM Plex Sans Thai',sans-serif;
  display:flex;flex-direction:column;padding:50px 50px 0;
}
#card::before{content:"";position:absolute;inset:0;pointer-events:none;
  background:
    linear-gradient(180deg,transparent 82%,rgba(0,0,0,.42)),
    repeating-linear-gradient(90deg,transparent 0 119px,rgba(255,255,255,.016) 119px 120px);}
#card::after{content:"";position:absolute;left:0;right:0;top:0;height:7px;
  background:linear-gradient(90deg,var(--orange),#FFC074 55%,var(--orange-deep));}

/* ---- header (segment bar แบบบ้าแบด) ---- */
.hd{position:relative;z-index:2;flex:0 0 auto;margin-bottom:20px}
.hd-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
.hd-mark{font-weight:700;font-size:18px;letter-spacing:.3px;color:var(--muted);line-height:1.2}
.hd-mark b{color:var(--orange);font-weight:800;font-size:21px}
.hd-modepill{font-weight:800;font-size:16px;letter-spacing:.5px;
  padding:8px 17px;border-radius:9px;color:#0A0D14;white-space:nowrap;
  box-shadow:0 6px 16px -8px rgba(0,0,0,.7)}
.hd-modepill.preview{background:var(--orange)}
.hd-modepill.results{background:var(--win)}
.hd-bar{display:flex;align-items:stretch;border-radius:15px;overflow:hidden;
  border:1px solid var(--line2);background:rgba(255,255,255,.035);
  box-shadow:0 14px 36px -20px rgba(0,0,0,.9)}
.hd-bar>span{display:flex;align-items:center;font-weight:800;line-height:1.05;white-space:nowrap}
.bar-title{padding:17px 24px;font-size:30px;color:#fff;letter-spacing:-.3px}
.bar-title b{color:var(--orange)}
.bar-date{margin-left:auto;padding:17px 26px;font-size:25px;color:#fff;
  background:linear-gradient(180deg,var(--maroon),var(--maroon-deep))}
.bar-start{padding:17px 22px;font-size:22px;color:#FFC074;
  background:rgba(255,106,26,.12);border-left:1px solid var(--line2)}
.hd-sub{margin-top:12px;font-size:19px;color:var(--faint);font-weight:600}
.hd-sub b{color:var(--muted)}

/* ---- body / rows (1 คอลัมน์วันเบา, 2 คอลัมน์วันหนาแน่น) ---- */
.body{position:relative;z-index:2;flex:1 1 auto;min-height:0;overflow:hidden;
  display:flex;flex-direction:column;justify-content:center}
.rows{column-count:var(--cols,1);column-gap:calc(14px*var(--rs));column-fill:balance}
.row{
  break-inside:avoid;-webkit-column-break-inside:avoid;position:relative;
  display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:calc(12px*var(--rs));
  background:linear-gradient(180deg,rgba(30,39,53,.55),rgba(19,26,37,.55));
  border:1px solid var(--line);border-radius:calc(15px*var(--rs));
  padding:calc(10px*var(--rs)) calc(12px*var(--rs));margin-bottom:calc(10px*var(--rs));
}
.row:last-child{margin-bottom:0}
.row.kmuttwin{border-color:rgba(47,191,113,.5);
  background:linear-gradient(180deg,rgba(25,52,40,.6),rgba(17,35,28,.6))}
.row.kmuttlose .rmatch{opacity:.9}
.row.bye{border-style:dashed;border-color:var(--line2)}

/* time block (ซ้าย, สีเด่นตามสถานะ) */
.rblk{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-width:calc(92px*var(--rs));align-self:stretch;padding:calc(6px*var(--rs)) calc(8px*var(--rs));
  border-radius:calc(11px*var(--rs));color:#fff;
  background:linear-gradient(180deg,#FF9248,#E85B12);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.22)}
.rblk .bt{font-weight:800;font-size:calc(30px*var(--rs));line-height:.95;
  font-variant-numeric:tabular-nums;letter-spacing:-1px}
.rblk .bu{font-size:calc(12.5px*var(--rs));font-weight:600;opacity:.9;margin-top:calc(2px*var(--rs))}
.rblk .bt.res{font-size:calc(25px*var(--rs));letter-spacing:0}  /* "ชนะ/แพ้" = ตัวอักษร เล็กกว่าตัวเลขเวลา */
.rblk.win{background:linear-gradient(180deg,#46DB8B,#15A75E)}
.rblk.lose{background:linear-gradient(180deg,#FF7269,#E13931)}
.rblk.wait{background:linear-gradient(180deg,#F4BC5C,#D98A1E)}
.rblk.bye{background:linear-gradient(180deg,#8294AB,#566783)}
.rblk.bye .bt{font-size:calc(21px*var(--rs))}

/* match (กลาง: ม.ซ้าย | VS/score | ม.ขวา) */
.rmatch{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:calc(8px*var(--rs));min-width:0}
.rside{display:flex;flex-direction:column;gap:calc(5px*var(--rs));min-width:0}
.rside.k{align-items:flex-end;text-align:right}
.rside.o{align-items:flex-start;text-align:left}
.nm{font-size:calc(21px*var(--rs));font-weight:600;line-height:1.18;color:var(--text)}
.pl{display:block;word-break:break-word}
.pl+.pl{margin-top:calc(4px*var(--rs))}                   /* ช่องว่างระหว่างผู้เล่น = แยกคนชัด อ่านง่าย */
.ttl{font-size:.72em;font-weight:600;color:var(--muted)}  /* คำนำหน้า (ผศ./รศ./ดร.) เล็ก-จาง ให้ชื่อจริงเด่น */
.rside.k .nm{font-weight:700;color:#fff}
.rside.dim .nm{color:var(--muted);font-weight:500}
.rside.win .nm{color:#fff;font-weight:800}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:calc(13.5px*var(--rs));font-weight:700;
  line-height:1;color:#fff;padding:calc(4px*var(--rs)) calc(10px*var(--rs));border-radius:7px;
  letter-spacing:.2px;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.16)}
.chip.k{background:var(--orange);border:1px solid rgba(255,180,120,.4)}  /* flat = ลด gradient ที่เยอะเกิน */
.chip .ck{font-size:calc(12px*var(--rs))}
.win-tick{color:var(--win);font-weight:900;margin-right:2px}

/* VS / score / pill */
.rvs{display:flex;align-items:center;justify-content:center;min-width:calc(54px*var(--rs))}
.vs{font-weight:800;font-style:italic;font-size:calc(25px*var(--rs));letter-spacing:-.5px;color:var(--gold);
  text-shadow:0 1px 0 #6e480e,0 calc(2px*var(--rs)) calc(5px*var(--rs)) rgba(0,0,0,.55)}
.vs.bye{color:var(--bye);font-style:normal;font-weight:700}
.score{font-weight:800;font-size:calc(21px*var(--rs));color:#fff;text-align:center;line-height:1.25;
  letter-spacing:-.3px;font-variant-numeric:tabular-nums;white-space:nowrap}
.pill{font-size:calc(13px*var(--rs));font-weight:800;padding:calc(5px*var(--rs)) calc(11px*var(--rs));
  border-radius:999px;line-height:1;white-space:nowrap}
.pill.win{color:#06140C;background:var(--win)}
.pill.lose{color:#fff;background:var(--lose)}
.pill.wait{color:var(--wait);background:rgba(240,169,46,.15);border:1px solid rgba(240,169,46,.45)}

/* tags (ขวา: badge ประเภท + รอบ/คอร์ต) */
.rtags{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;
  gap:calc(5px*var(--rs));min-width:calc(60px*var(--rs))}
.ev{font-weight:800;font-size:calc(15px*var(--rs));color:#fff;letter-spacing:.3px;
  padding:calc(4px*var(--rs)) calc(9px*var(--rs));border-radius:7px;white-space:nowrap;
  background:rgba(255,255,255,.07);border:1px solid var(--line2)}  /* นิ่ง: สีประเภท = accent ซ้าย (ดู inline) */
.meta{font-size:calc(12.5px*var(--rs));color:var(--faint);text-align:right;line-height:1.2;white-space:nowrap}

/* empty */
.empty{grid-column:1/-1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--muted);gap:10px;text-align:center;padding:60px 0}
.empty .big{font-size:34px;font-weight:800;color:var(--text)}

/* ---- footer (เชียร์ทีม แบบบ้าแบด) ---- */
.ft{position:relative;z-index:2;flex:0 0 auto;padding:18px 2px 24px;margin-top:12px;
  border-top:1px solid var(--line)}
.ft-cheer{font-weight:800;font-size:29px;color:#fff;letter-spacing:-.3px;margin-bottom:9px}
.ft-cheer span{color:var(--orange)}
.ft-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.ft-mark{font-weight:800;font-size:19px;color:var(--muted);letter-spacing:.4px}
.ft-mark b{color:#fff}
.ft-tag{font-weight:800;font-size:19px;color:var(--orange);letter-spacing:.3px}
.ft-by{margin-top:11px;font-size:15px;color:var(--faint);font-weight:600;letter-spacing:.2px}
.ft-by b{color:var(--muted)}

/* ฟอนต์ display หัว/เลข/badge = Bai Jamjuree (ฝัง base64), ชื่อผู้เล่นคง Plex เพื่ออ่านง่าย */
.bar-title,.bar-date,.bar-start,.hd-modepill,.hd-mark b,
.rblk .bt,.vs,.score,.ev,.ft-cheer,.ft-mark,.ft-tag,.ft-by{
  font-family:'Bai Jamjuree','IBM Plex Sans Thai',sans-serif;
}

/* ===== ธีมสว่าง: แถวขาวบนเฟรมมืด (แบบตารางบ้าแบด รูป 2-3) — เปลี่ยนเฉพาะแถว ===== */
#card.light .row{background:#FFFFFF;border-color:#E6E9F1}
#card.light .row.kmuttwin{background:#EAF9F1;border-color:#9DE2BD}
#card.light .row.kmuttlose .rmatch{opacity:.7}
#card.light .row.bye{background:#F2F5FA;border-color:#DBE0EA}
#card.light .nm{color:#232a37}
#card.light .rside.k .nm{color:#0E1320}
#card.light .rside.win .nm{color:#0E1320}
#card.light .rside.dim .nm{color:#9AA3B2}
#card.light .vs{color:#C28A1B;text-shadow:none}
#card.light .vs.bye{color:#6E8DB5}
#card.light .score{color:#1A2230}
#card.light .meta{color:#8C98AA}
#card.light .ev{background:#EEF1F6;border-color:#D7DDE8;color:#2A3340}
#card.light .ttl{color:#8C98AA}
#card.light .pill.wait{color:#A86E15;background:rgba(240,169,46,.16);border-color:rgba(240,169,46,.5)}
</style>
</head>
<body>

<!-- ===== toolbar (เครื่องมือผู้ดูแล — ไม่อยู่ในรูป export) ===== -->
<div class="toolbar">
  <div class="tool">
    <button id="prev" title="วันก่อนหน้า">◀</button>
    <input type="date" id="datein">
    <button id="next" title="วันถัดไป">▶</button>
  </div>
  <div class="seg" id="modeseg">
    <button data-m="preview" class="on">เช้า · พรีวิว</button>
    <button data-m="results">ค่ำ · ผล</button>
  </div>
  <div class="seg" id="themeseg">
    <button data-t="dark" class="on">🌙 มืด</button>
    <button data-t="light">☀️ สว่าง</button>
  </div>
  <button class="dl" id="dl">⬇ ดาวน์โหลด PNG</button>
</div>
<div class="hint">โหมด <b id="hintmode">preview</b> · ขนาด 1080×1350 · URL: <code id="hinturl"></code></div>

<!-- ===== stage + card ===== -->
<div class="stagewrap" id="stagewrap">
  <div class="stage" id="stage">
    <div id="card"><!-- render --></div>
  </div>
</div>

<script>
/* ============================================================
   CONFIG
   ============================================================ */
const TOURNAMENT = "กีฬาบุคลากรมหาวิทยาลัยแห่งประเทศไทย ครั้งที่ 42 มศว เกมส์";
const KMUTT_NAME = "มจธ.";
const SOCIAL_HANDLE = "KMUTT Badminton";
const HASHTAG = "#มจธ #มศวเกมส์42";
const EXPORT_SCALE = 1;           // 1 = ได้ไฟล์ 1080x1350 พอดี (เพิ่มเป็น 2 ถ้าต้องการ retina)

/* ตัวย่อ + สีประจำสถาบัน — สร้างจากค่า uni จริงในข้อมูล (ดู task_0)
   ฝั่ง มจธ. ไม่มี field uni (ข้อมูล pre-filter แล้ว) จึงใช้ chip "มจธ." คงที่ */
const UNIVERSITY_ABBR_MAP = {
  "มจธ.":                              {color:"#FF6A1A"},
  "ม.เชียงใหม่":                        {color:"#6A3FA0"},
  "ม.เกษตรศาสตร์":                      {color:"#1F7A4D"},
  "ม.สุโขทัยธรรมาธิราช":                 {color:"#0E8C84", short:"มสธ."},
  "ม.ธรรมศาสตร์":                       {color:"#C8322B"},
  "ม.มหามกุฏราชวิทยาลัย":               {color:"#9A6B12", short:"มมร."},
  "มทร.อีสาน":                          {color:"#7B1E2B"},
  "อว.":                               {color:"#3A5A8C"},
  "มรภ.บ้านสมเด็จเจ้าพระยา":             {color:"#2563A8", short:"มรภ.บ้านสมเด็จฯ"},
  "ม.เทคโนโลยีสุรนารี":                  {color:"#8A5A1E", short:"มทส."},
  "มรภ.พระนคร":                         {color:"#2F7FA0"},
  "ม.มหาจุฬาลงกรณราชวิทยาลัย":           {color:"#C07A12", short:"มจร."},
  "ม.มหิดล":                            {color:"#16386B"},
  "มทร.ล้านนา":                         {color:"#6B2737"},
  "มรภ.ราชนครินทร์":                     {color:"#3C6E8F"},
  "มรภ.วไลยอลงกรณ์ ในพระบรมราชูปถัมภ์":  {color:"#4F7A4A", short:"มรภ.วไลยอลงกรณ์"},
};
const FALLBACK_COLORS = ["#3A5A8C","#5B6B3A","#7A3F6A","#3F6E6A","#8C5A2B","#4A4F8C","#6B3A3A","#2F6E54"];
function uniStyle(uni){
  const u=(uni||"").trim();
  if(!u) return null;                       // uni ว่าง = ซ่อน chip
  if(UNIVERSITY_ABBR_MAP[u]) return {abbr:UNIVERSITY_ABBR_MAP[u].short||u, color:UNIVERSITY_ABBR_MAP[u].color};
  let h=0; for(const c of u) h=(h*31+c.charCodeAt(0))>>>0;   // สีคงที่ต่อชื่อสำหรับ ม. นอก map
  return {abbr:u, color:FALLBACK_COLORS[h%FALLBACK_COLORS.length]};
}

/* ============================================================
   DATA — โครงสร้างจริง: {id,event,round,th,iso,court,kmutt:[ชื่อ],opp:[{name,uni}],result,score,tbd}
   ============================================================ */
let DATA = [];
function fromFallback(){ return (window.KMUTT_FALLBACK?.matches||[]).map(m=>({...m})); }
async function loadData(){
  try{
    const r=await fetch("/api/matches",{cache:"no-store"});
    if(r.ok){ const j=await r.json(); if(j&&Array.isArray(j.matches)&&j.matches.length){ return j.matches.map(m=>({...m})); } }
  }catch(e){}
  return fromFallback();           // fallback: data.js ฝังในเว็บ (ทำงาน offline ได้)
}

/* ---------- ตัวจำแนกผล (logic เดียวกับหน้าเว็บหลัก) ---------- */
function rclass(r){ r=(r||"").trim();
  if(/ชนะ|^w$|win/i.test(r)) return "win";
  if(/แพ้|^l$|lose|loss/i.test(r)) return "lose";
  if(/บาย|bye/i.test(r)) return "bye";
  return "wait"; }
/* แมตช์ "บาย" (ผ่านเข้ารอบ ไม่ได้ลงเล่นจริง) — ซ่อนจากการ์ดสรุปทั้ง 2 โหมด */
function isByeMatch(m){
  if(rclass(m.result)==="bye") return true;
  const oppNames=(m.opp||[]).map(o=>o.name).filter(n=>n && n!=="Bye" && n!=="รอคู่แข่ง");
  const isTbd=m.tbd || (m.opp||[]).some(o=>o.name==="รอคู่แข่ง");
  return !isTbd && !oppNames.length;   // ไม่มีคู่แข่งจริง และไม่ใช่ "รอคู่แข่ง" = บาย
}
function roundTH(r){ r=(r||"").trim();
  const ro=r.match(/Round\s*of\s*(\d+)/i);
  if(ro){const n=+ro[1];
    if(n===2)return"รอบชิงฯ"; if(n===4)return"รอบรองฯ";
    return"รอบ "+n+" คู่";}                          // 128/64/32/16/8
  if(/quarter|^qf$/i.test(r))return"รอบ 8 คู่";
  if(/semi|^sf$/i.test(r))return"รอบรองฯ";
  if(/grand\s*final|^final$|^f$/i.test(r))return"รอบชิงฯ";
  if(/3rd|third|bronze|play[\s-]*off/i.test(r))return"ชิงอันดับ 3";
  return r; }
function esc(s){ return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

/* ---------- สีประจำประเภท (ชายคู่/หญิงคู่/คู่ผสม) ---------- */
function eventColor(ev){
  const e=(ev||"").toUpperCase();
  if(e.startsWith("MD")) return "#2D7DD2";   // ชายคู่ — น้ำเงิน
  if(e.startsWith("WD")) return "#E8478C";   // หญิงคู่ — ชมพู
  if(e.startsWith("XD")) return "#8B5CF6";   // คู่ผสม — ม่วง
  if(e.startsWith("MS")) return "#2FA37A";   // ชายเดี่ยว — เขียว
  if(e.startsWith("WS")) return "#D98324";   // หญิงเดี่ยว — ส้มเข้ม
  return "#5B6B86";
}

/* ---------- วันที่ไทย ---------- */
const THDAY=["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัสบดี","ศุกร์","เสาร์"];
const THDAY3=["อา","จ","อ","พ","พฤ","ศ","ส"];
const THMON=["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
const THMON3=["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
function dateKey(m){ return (m.iso||"").slice(0,10); }
function thaiFullDate(d){
  if(!/^\d{4}-\d\d-\d\d$/.test(d)) return d||"";
  const [y,mo,da]=d.split("-").map(Number);
  const wd=new Date(Date.UTC(y,mo-1,da)).getUTCDay();
  return {wd:"วัน"+THDAY[wd], rest:`ที่ ${da} ${THMON[mo-1]} ${y+543}`};
}
function thaiShortDate(d){
  if(!/^\d{4}-\d\d-\d\d$/.test(d)) return d||"";
  const [y,mo,da]=d.split("-").map(Number);
  const wd=new Date(Date.UTC(y,mo-1,da)).getUTCDay();
  return `${THDAY3[wd]} ${da} ${THMON3[mo-1]} ${y+543}`;
}
function timeOf(m){ return ((m.th||"")+" "+(m.iso||"")).match(/(\d{1,2}):(\d{2})/); }
function sortKey(m){
  const t=timeOf(m); const time=t?String(t[1]).padStart(2,"0")+":"+t[2]:"99:99";
  return time+(m.id||""); }

/* ============================================================
   RENDER — การ์ดเดียว, โหมดต่างกันแค่ result block
   ============================================================ */
/* ย่อคำนำหน้าตำแหน่งวิชาการ (กันชื่อยาวตีกลับหลายบรรทัด -> การ์ดสูงไม่เท่ากัน) */
function shortenName(s){ return (s||"")
  .replace(/ผู้ช่วยศาสตราจารย์/g,"ผศ.").replace(/รองศาสตราจารย์/g,"รศ.")
  .replace(/ศาสตราจารย์/g,"ศ.").replace(/อาจารย์/g,"อ.")
  .replace(/\s+/g," ").trim(); }
/* จัดรูปชื่อ: ดึงคำนำหน้า (ผศ./รศ./ศ./อ./ดร./นาย...) มาทำตัวเล็ก-จาง ให้ "ชื่อจริง" เด่น */
function fmtName(raw){
  const s = shortenName(raw);
  const m = s.match(/^((?:ผศ\.|รศ\.|ศ\.|อ\.|ดร\.|นางสาว|นาย|นาง|น\.ส\.)\s*)+/);
  if(m && s.length > m[0].length)
    return `<span class="ttl">${esc(m[0].trim())}</span> ${esc(s.slice(m[0].length).trim())}`;
  return esc(s);
}
function sideHTML(names, sideClass, opts){
  // แต่ละผู้เล่น = 1 <span class="pl"> (แยกบรรทัดชัด) ✔ ติดที่คนแรกของฝั่งที่ชนะ
  const players = names.length
    ? names.map((n,i)=>`<span class="pl">${(i===0&&opts.win)?'<span class="win-tick">✔</span>':''}${fmtName(n)}</span>`).join("")
    : '<span class="pl">—</span>';
  const chip = opts.chip ? `<span class="chip ${opts.kmutt?'k':''}" ${opts.color?`style="background:${opts.color}"`:''}>${opts.kmutt?'<span class="ck">★</span>':''}${esc(opts.chip)}</span>` : "";
  return `<div class="rside ${sideClass} ${opts.win?'win':''} ${opts.dim?'dim':''}">
    ${chip}<div class="nm">${players}</div></div>`;
}

function rowHTML(m, mode){
  const cls = rclass(m.result);
  const isResults = mode==="results";
  const t = timeOf(m);
  const oppNames = m.opp.map(o=>o.name).filter(n=>n && n!=="Bye" && n!=="รอคู่แข่ง");
  const isTbd = m.tbd || m.opp.some(o=>o.name==="รอคู่แข่ง");
  const isBye = cls==="bye" || (!isTbd && !oppNames.length);
  const oppUniRaw = (m.opp.find(o=>o.uni && o.uni.trim())||{}).uni || "";
  const oppU = uniStyle(oppUniRaw);

  // ฝั่ง มจธ. (ซ้าย) — chip คงที่ "มจธ."
  const kWin = isResults && cls==="win";
  const kDim = isResults && cls==="lose";
  const kmuttSide = sideHTML(m.kmutt, "k", {chip:KMUTT_NAME, kmutt:true, win:kWin, dim:kDim});

  // ฝั่งคู่แข่ง (ขวา)
  let oppSide;
  if(isBye){
    oppSide = `<div class="rside o"><div class="nm" style="color:var(--bye)">ผ่านเข้ารอบ</div></div>`;
  }else if(isTbd){
    oppSide = `<div class="rside o"><div class="nm" style="color:var(--wait)">รอคู่แข่ง</div></div>`;
  }else{
    const oWin = isResults && cls==="lose";
    const oDim = isResults && cls==="win";
    oppSide = sideHTML(oppNames, "o", {chip:oppU?oppU.abbr:"", color:oppU?oppU.color:"", win:oWin, dim:oDim});
  }

  // กลาง: VS ทอง / score / pill
  let mid;
  if(isBye){
    mid = `<span class="vs bye">→</span>`;
  }else if(isResults && (cls==="win"||cls==="lose") && m.score){
    // สกอร์: เรียงแต่ละเกมบนลงล่าง (21-6 / 21-7) ไม่ใช่ต่อกันแนวนอน + แคบลง คืนที่ให้ชื่อ
    mid = `<span class="score">${m.score.split(",").map(g=>esc(g.trim())).filter(Boolean).join("<br>")}</span>`;
  }else if(isResults && (cls==="win"||cls==="lose")){   // มีผลแล้วแต่ยังไม่กรอกสกอร์
    mid = `<span class="pill ${cls}">${cls==="win"?"ชนะ":"แพ้"}</span>`;
  }else if(isResults && cls==="wait"){
    mid = `<span class="pill wait">รอแข่ง</span>`;
  }else{ // preview (ทุก match) หรือ tbd
    mid = `<span class="vs">VS</span>`;
  }

  // time block (ซ้าย)
  //  โหมดผล (ตัดสินแล้ว): โชว์ "ชนะ/แพ้" เป็นตัวหลัก + เวลาเล็กด้านล่าง
  //    เหตุผล: การ์ดผล "ผลแพ้-ชนะ" สำคัญสุด (ไม่ใช่เวลา) + ใช้ข้อความบอกผล
  //    = คนตาบอดสีอ่านได้ ไม่ต้องพึ่งเขียว/แดงอย่างเดียว
  //  โหมดพรีวิว/รอแข่ง/บาย: โชว์เวลาเป็นตัวหลักเหมือนเดิม
  const blkCls = isBye ? "bye" : (isResults ? cls : "");
  const isDecided = isResults && (cls==="win" || cls==="lose");
  const timeStr = t ? `${t[1]}.${t[2]} น.` : "";
  let blk;
  if(isBye){
    blk = `<div class="rblk bye"><span class="bt">บาย</span></div>`;
  }else if(isDecided){
    blk = `<div class="rblk ${cls}"><span class="bt res">${cls==="win"?"ชนะ":"แพ้"}</span>${timeStr?`<span class="bu">${timeStr}</span>`:""}</div>`;
  }else{
    blk = `<div class="rblk ${blkCls}">${t
        ? `<span class="bt">${t[1]}.${t[2]}</span><span class="bu">น.</span>`
        : `<span class="bt" style="font-size:calc(17px*var(--rs))">TBD</span>`}</div>`;
  }

  // tags (ขวา): badge ประเภท (สีตามประเภท) + รอบ/คอร์ต (ซ่อนถ้าว่าง)
  const meta = [];
  if(m.round) meta.push(esc(roundTH(m.round)));
  if(!isBye && m.court) meta.push(esc(m.court));
  const tags = `<div class="rtags">
     <span class="ev" style="border-left:3px solid ${eventColor(m.event)}">${esc(m.event)}</span>
     ${meta.length?`<span class="meta">${meta.join("<br>")}</span>`:""}
   </div>`;

  const rowCls = kWin ? "kmuttwin" : (kDim ? "kmuttlose" : (isBye ? "bye" : ""));
  return `<div class="row ${rowCls}">
    ${blk}
    <div class="rmatch">${kmuttSide}<div class="rvs">${mid}</div>${oppSide}</div>
    ${tags}
  </div>`;
}

function renderCard(date, mode){
  const matches = DATA.filter(m=>dateKey(m)===date && !isByeMatch(m)).sort((a,b)=>sortKey(a).localeCompare(sortKey(b)));
  const dShort = thaiShortDate(date);
  const titleTxt = mode==="results" ? "ผลการแข่งขัน" : "ตารางแข่งวันนี้";
  // สรุปผลแพ้-ชนะของวัน (โหมดผล) — เฉพาะแมตช์ที่ตัดสินแล้ว
  const decided = matches.filter(m=>{const c=rclass(m.result);return c==="win"||c==="lose";});
  const wins = decided.filter(m=>rclass(m.result)==="win").length;
  const recordHTML = (mode==="results" && decided.length)
    ? ` · ชนะ <b style="color:var(--win)">${wins}</b> แพ้ <b style="color:var(--lose)">${decided.length-wins}</b>` : "";
  const firstT = (matches.map(timeOf).filter(Boolean)
    .map(x=>x[1].padStart(2,"0")+"."+x[2]).sort()[0]||"").replace(/^0/,"");  // sort เติม 0, โชว์ strip ให้ตรงกับ block ในแถว

  const header = `<div class="hd">
    <div class="hd-row">
      <div class="hd-mark"><b>มศว</b> GAMES 42 · กีฬาบุคลากรมหาวิทยาลัยฯ ครั้งที่ 42</div>
      <div class="hd-modepill ${mode}">${mode==="results"?"ผล":"พรีวิว"}</div>
    </div>
    <div class="hd-bar">
      <span class="bar-title">ทีม <b>มจธ.</b> · ${esc(titleTxt)}</span>
      <span class="bar-date">${esc(dShort)}</span>
      ${firstT?`<span class="bar-start">เริ่ม ${esc(firstT)}</span>`:""}
    </div>
    <div class="hd-sub">แบดมินตัน · ${matches.length?`<b>${matches.length}</b> แมตช์ของทีม มจธ.`:"ทีม มจธ."}${recordHTML}</div>
  </div>`;

  const cols = matches.length>8 ? 2 : 1;   // วันหนาแน่น (>8 แมตช์) ใช้ 2 คอลัมน์
  let body;
  if(!matches.length){
    body = `<div class="body"><div class="empty"><div class="big">ไม่มีแมตช์ของทีม มจธ. ในวันนี้</div><div>เลือกวันอื่นจากแถบเครื่องมือด้านบน</div></div></div>`;
  }else{
    body = `<div class="body"><div class="rows" style="--cols:${cols}">${matches.map(m=>rowHTML(m,mode)).join("")}</div></div>`;
  }

  const footer = `<div class="ft">
    <div class="ft-cheer">เชียร์ <span>มจธ.</span> ไปกับ <span>${esc(SOCIAL_HANDLE)}</span></div>
    <div class="ft-row">
      <span class="ft-mark"><b>มจธ.</b> · มศว เกมส์ 42 · แบดมินตัน</span>
      <span class="ft-tag">${esc(HASHTAG)}</span>
    </div>
    <div class="ft-by">ออกแบบ &amp; พัฒนาโดย <b>Tayakorn</b> · github.com/tayakorn221</div>
  </div>`;

  document.getElementById("card").innerHTML = header + body + footer;
  fitRows();
}

/* auto-fit + การ์ดสูงเท่ากัน (มี guard กันตัดแถวเงียบ ๆ วันแมตช์เยอะ):
   ปกติ: ดันทุกใบสูงเท่ากัน + ย่อ --rs จนพอดีการ์ด
   guard: ถ้าเท่ากันแล้วย่อจนสุด (rs 0.5) ยังล้น -> ถอยใช้ความสูงตามเนื้อหา
          (เห็นครบทุกแมตช์ สำคัญกว่าความสูงเท่ากัน) */
function fitRows(){
  const card=document.getElementById("card");
  const body=card.querySelector(".body");
  const rows=card.querySelector(".rows");
  if(!rows) return;
  const items=[...rows.children];
  let rs=1, fits=false;
  for(let i=0;i<18;i++){
    card.style.setProperty("--rs",rs);
    items.forEach(r=>{ r.style.height="auto"; });                  // วัดความสูงตามเนื้อหาจริง
    let maxH=0; items.forEach(r=>{ const h=r.offsetHeight; if(h>maxH) maxH=h; });  // offsetHeight = layout px (ไม่หดตาม transform #stage)
    items.forEach(r=>{ r.style.height=Math.ceil(maxH)+"px"; });    // ทุกใบสูง = ใบที่สูงสุด
    if(rows.scrollHeight<=body.clientHeight){ fits=true; break; }  // พอดีการ์ดแล้ว
    if(rs<=0.5) break;
    rs=Math.max(0.5, rs-0.04);
  }
  if(!fits){                                                       // guard: เท่ากันแล้วยังล้น
    items.forEach(r=>{ r.style.height="auto"; });                  //   -> เลิกบังคับสูงเท่ากัน ใช้ความสูงจริง (เห็นครบ)
  }
}

/* ============================================================
   EXPORT — embed ฟอนต์ไทย base64 ก่อน toPng (กันข้อความเพี้ยน)
   ============================================================ */
function ensureFontStyle(){
  if(document.getElementById("thaiFontEmbed")) return;
  const s=document.createElement("style"); s.id="thaiFontEmbed";
  s.textContent=window.THAI_FONT_CSS||""; document.head.appendChild(s);
}
async function exportPNG(){
  const btn=document.getElementById("dl"); btn.disabled=true; const old=btn.textContent; btn.textContent="กำลังสร้างรูป…";
  try{
    ensureFontStyle();
    if(document.fonts&&document.fonts.ready) await document.fonts.ready;
    fitRows();   // วัด fit ด้วย metric ฟอนต์จริงก่อน export (กันแถวล้น/ตกขอบในรูป)
    const card=document.getElementById("card");
    const dataUrl=await htmlToImage.toPng(card,{
      width:1080, height:1350, pixelRatio:EXPORT_SCALE, cacheBust:true,
      backgroundColor:"#0A0D12",
      fontEmbedCSS: window.THAI_FONT_CSS || "",   // ← กุญแจสำคัญ: ไม่ให้ไปดึงฟอนต์ภายนอก
      style:{margin:"0"}
    });
    const a=document.createElement("a");
    a.download=`summary-${STATE.date}-${STATE.mode}${STATE.theme==="light"?"-light":""}.png`; a.href=dataUrl; a.click();
  }catch(e){ alert("สร้างรูปไม่สำเร็จ: "+e); console.error(e); }
  finally{ btn.disabled=false; btn.textContent=old; }
}

/* ============================================================
   STATE / URL / TOOLBAR
   ============================================================ */
const STATE={date:"",mode:"preview",theme:"dark"};
function applyTheme(){ document.getElementById("card").classList.toggle("light", STATE.theme==="light"); }
function availableDates(){ return [...new Set(DATA.map(dateKey))].filter(Boolean).sort(); }
function syncToolbar(){
  document.getElementById("datein").value=STATE.date;
  document.querySelectorAll("#modeseg button").forEach(b=>b.classList.toggle("on",b.dataset.m===STATE.mode));
  document.querySelectorAll("#themeseg button").forEach(b=>b.classList.toggle("on",b.dataset.t===STATE.theme));
  document.getElementById("hintmode").textContent=STATE.mode;
  document.getElementById("hinturl").textContent=`summary.html?date=${STATE.date}&mode=${STATE.mode}${STATE.theme==="light"?"&theme=light":""}`;
  const u=new URL(location); u.searchParams.set("date",STATE.date); u.searchParams.set("mode",STATE.mode);
  if(STATE.theme==="light") u.searchParams.set("theme","light"); else u.searchParams.delete("theme");
  history.replaceState(null,"",u);
}
function go(){ syncToolbar(); renderCard(STATE.date,STATE.mode); applyTheme(); fitStage(); }
function shiftDate(dir){
  const ds=availableDates(); const i=ds.indexOf(STATE.date);
  const ni=Math.min(ds.length-1,Math.max(0,(i<0?0:i)+dir));
  if(ds[ni]){ STATE.date=ds[ni]; go(); }
}

/* ย่อ stage ให้พอดีจอ (เฉพาะการแสดงผล — ไม่กระทบไฟล์ export)
   wrapper ถูกกำหนดขนาด = ขนาดที่ย่อแล้ว จึงไม่เกิด scroll แนวนอน */
function fitStage(){
  const avail=Math.min(window.innerWidth-24, 1080);
  const s=Math.min(1, avail/1080);
  document.getElementById("stage").style.transform=`scale(${s})`;
  const wrap=document.getElementById("stagewrap");
  wrap.style.width=(1080*s)+"px";
  wrap.style.height=(1350*s)+"px";
}
window.addEventListener("resize",fitStage);

/* ---------- init ---------- */
(async function init(){
  DATA=await loadData();
  const qs=new URLSearchParams(location.search);
  const today=new Date(); const todayISO=today.getFullYear()+"-"+String(today.getMonth()+1).padStart(2,"0")+"-"+String(today.getDate()).padStart(2,"0");
  // clampDate ใช้ today จริง
  const ds=availableDates();
  // มี ?date= รูปแบบถูกต้อง = ใช้ตามนั้น (ไม่มีแมตช์ก็โชว์ empty — ตรงกับ date-picker)
  // ไม่มี/รูปแบบผิด = default เป็นวันนี้ ไม่งั้นวันแรกที่มีข้อมูล
  let d=qs.get("date");
  if(!/^\d{4}-\d{2}-\d{2}$/.test(d||"")) d = ds.includes(todayISO) ? todayISO : (ds[0]||todayISO);
  STATE.date=d;
  STATE.mode = qs.get("mode")==="results" ? "results" : "preview";
  STATE.theme = qs.get("theme")==="light" ? "light" : "dark";

  document.getElementById("prev").onclick=()=>shiftDate(-1);
  document.getElementById("next").onclick=()=>shiftDate(1);
  document.getElementById("datein").onchange=e=>{ STATE.date=e.target.value; go(); };
  document.querySelectorAll("#modeseg button").forEach(b=>b.onclick=()=>{ STATE.mode=b.dataset.m; go(); });
  document.querySelectorAll("#themeseg button").forEach(b=>b.onclick=()=>{ STATE.theme=b.dataset.t; go(); });
  document.getElementById("dl").onclick=exportPNG;

  // ฝังฟอนต์ตั้งแต่แรกให้จอ = รูป export และ pre-warm
  ensureFontStyle();
  go();
  // วัด fit ใหม่หลังฟอนต์โหลดจริง (metric ต่างจาก fallback ตอน cold load)
  if(document.fonts&&document.fonts.ready) document.fonts.ready.then(()=>{
    if(document.querySelector("#card .rows")) fitRows();
  });
})();
</script>
